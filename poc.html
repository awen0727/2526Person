<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>群愛獅子會 - 人臉辨識 POC 測試台</title>
    
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h2 { color: #fbd050; margin-bottom: 10px; font-size: 1.2rem; }
        #video-container { position: relative; border: 3px solid #fbd050; border-radius: 10px; overflow: hidden; background: #000; box-shadow: 0 0 20px rgba(251, 208, 80, 0.3); width: 90%; max-width: 600px; }
        video { width: 100%; height: auto; max-height: 60vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #log { margin-top: 15px; color: #aaa; width: 90%; max-width: 600px; text-align: left; height: 120px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; background: #222; padding: 10px; border-radius: 8px; box-sizing: border-box;}
    </style>
</head>
<body>
    <h2>🦁 群愛獅子會人臉辨識簽到系統 測試版</h2>
    <div id="video-container">
        <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="log">系統初始化中...</div>

    <script>
        // 捕捉全域錯誤，直接印在手機畫面上，方便我們除錯！
        window.onerror = function(message) {
            log("💥 系統報錯: " + message);
        };

        const video = document.getElementById('video');
        const logDiv = document.getElementById('log');
        const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';

        // ★★★ Master 請記得把這裡改回您上傳的照片檔名！ ★★★
        // 例如您上傳了 Chris.jpg，這裡就填 ["Chris"]
        const LabeledNames = ["Chris"]; 

        function log(msg) {
            console.log(msg);
            logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
        }

        async function init() {
            try {
                log("⏳ 正在下載 AI 視覺模型 (約需 10~20 秒)...");
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                log("✅ 模型載入完成！開始讀取照片...");
                start();
            } catch (e) {
                log("❌ 模型下載失敗: " + e.message);
            }
        }

        async function loadLabeledImages() {
            return Promise.all(
                LabeledNames.map(async label => {
                    const descriptions = [];
                    try {
                        const img = await faceapi.fetchImage(`${label}.jpg`);
                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if(detections) {
                            descriptions.push(detections.descriptor);
                            log(`📸 成功提取：${label} 的臉部特徵`);
                        } else {
                            log(`⚠️ 失敗：無法在 ${label}.jpg 找清楚的臉`);
                        }
                    } catch (e) {
                        log(`❌ 照片讀取失敗：找不到 ${label}.jpg`);
                    }
                    return new faceapi.LabeledFaceDescriptors(label, descriptions);
                })
            );
        }

        async function start() {
            try {
                const labeledFaceDescriptors = await loadLabeledImages();
                
                if (labeledFaceDescriptors[0].descriptors.length === 0) {
                    log("🛑 缺乏臉部特徵，系統終止。請換一張正面清晰照上傳。");
                    return;
                }

                const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5); 
                log("✅ 記憶庫建置完畢！正在請求手機相機權限...");

                // 💡 強制要求手機使用前置鏡頭 (自拍鏡頭)
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;

                video.addEventListener('play', () => {
                    const canvas = faceapi.createCanvasFromMedia(video);
                    document.getElementById('video-container').append(canvas);
                    
                    // 💡 修復手機版影像比例問題
                    const displaySize = { width: video.videoWidth, height: video.videoHeight };
                    faceapi.matchDimensions(canvas, displaySize);

                    log("🟢 系統即時辨識中... 請看向手機！");

                    setInterval(async () => {
                        const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                        const resizedDetections = faceapi.resizeResults(detections, displaySize);
                        
                        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                        
                        const results = resizedDetections.map(d => faceMatcher.findBestMatch(d.descriptor));
                        
                        results.forEach((result, i) => {
                            const box = resizedDetections[i].detection.box;
                            const drawColor = result.label === 'unknown' ? '#d32f2f' : '#fbd050';
                            const drawBox = new faceapi.draw.DrawBox(box, { label: result.toString(), boxColor: drawColor });
                            drawBox.draw(canvas);
                        });
                    }, 200); // 手機效能考量，改為每 0.2 秒掃描一次
                });
            } catch (e) {
                log("❌ 啟動失敗: " + e.message);
            }
        }

        // 確保網頁所有元件準備好再啟動
        window.addEventListener('load', init);
    </script>
</body>
</html>
